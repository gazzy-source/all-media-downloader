name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import package smoke test
        run: |
          python -c "
          from bot.config import BOT_NAME, QUALITY_MAP
          from bot.utils.helpers import extract_urls, platform_from_url, progress_bar
          from bot.services.downloader import available_qualities_for
          from bot.utils.instance_lock import acquire_single_instance
          assert extract_urls('see https://youtu.be/dQw4w9WgXcQ')
          assert platform_from_url('https://x.com/a/status/1') == 'X / Twitter'
          assert '720' in available_qualities_for([720, 1080])
          print('smoke ok', BOT_NAME)
          "

      - name: Syntax compile
        run: python -m compileall -q bot run.py
